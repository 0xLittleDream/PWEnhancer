<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW TrueTime</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icon48.png" width="24" height="24" style="border-radius: 4px;" alt="Logo">
                <h1 style="color: white; font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.5px;">PW Enhancer</h1>
            </div>
            <p style="font-size: 12px; color: #A3A3A3; margin: 0;">Enhance your lectures.</p>
        </header>

        <div class="section" style="text-align: center; padding: 20px 16px;">
            <div style="font-size: 12px; color: #A3A3A3; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Today's Study Time</div>
            <div id="study-time-display" style="font-size: 32px; font-weight: 700; color: #FFFFFF; font-variant-numeric: tabular-nums; letter-spacing: -1px; margin-bottom: 8px;">
                00h 00m
            </div>
            <div style="font-size: 10px; color: #666666; line-height: 1.4;">
                Time is measured based on total active time spent on videos, notes, and DPPs.
            </div>
        </div>

        <div class="section">
            <div class="setting-row">
                <div class="setting-info">
                    <h3 class="setting-title">Show TrueTime UI</h3>
                    <p class="setting-desc">Show the exact time remaining based on playback speed.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="show-truetime" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="setting-row" style="margin-bottom: 0; padding-bottom: 0; border-bottom: none;">
                <div class="setting-info">
                    <h3 class="setting-title">Custom Speed</h3>
                    <p class="setting-desc">Override native limits.<br><span style="font-size:10px; opacity:0.7;">(accessible in site too)</span></p>
                </div>
                <select id="speed-dropdown" style="background: #111111; color: #FFFFFF; border: 1px solid #333333; border-radius: 6px; padding: 6px 8px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;">
                    <option value="1.0">1.00x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.50x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2.0">2.00x</option>
                    <option value="2.25">2.25x</option>
                    <option value="2.5">2.50x</option>
                    <option value="3.0">3.00x</option>
                    <option value="4.0">4.00x</option>
                </select>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
